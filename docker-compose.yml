services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-screener}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-screener}
      POSTGRES_DB: ${POSTGRES_DB:-screener}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-screener} -d ${POSTGRES_DB:-screener}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.monorepo
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: ["npx", "prisma", "migrate", "deploy", "--schema=packages/database/prisma/schema.prisma"]
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.monorepo
    env_file:
      - .env
    environment:
      NODE_ENV: production
    command: ["npm", "run", "start", "-w", "@screener/backend"]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.monorepo
    env_file:
      - .env
    environment:
      NODE_ENV: production
      # Nginx proxies /api/ calls here (for the browser)
      NEXT_PUBLIC_API_URL: /api
      # Internal absolute URL for Next.js SSR to reach Fastify
      INTERNAL_API_URL: http://backend:4000
    command: ["npm", "run", "start", "-w", "@screener/frontend"]
    depends_on:
      backend:
        condition: service_started

  nginx:
    image: nginx:alpine
    ports:
      - "3011:3011"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend

volumes:
  postgres_data:
  redis_data:
